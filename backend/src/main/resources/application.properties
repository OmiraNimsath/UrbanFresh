spring.application.name=UrbanFresh

# ========================
# MySQL DataSource
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/urbanfresh
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========================
# JWT Configuration
# ========================
jwt.secret=VXJiYW5GcmVzaC1TdXBlci1TZWNyZXQtS2V5LTI1Ni1CaXQtTG9uZy1FbnRlcnByaXNl
jwt.expiration=86400000

# ========================
# Server
# ========================
server.port=8080

# ========================
# File Upload
# ========================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Directory where uploaded product images are stored (relative to working dir)
app.upload.dir=uploads
# Public base URL used to build image URLs returned by the upload endpoint
app.base-url=http://localhost:8080

